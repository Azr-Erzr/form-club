<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content">
  <title>Form — Exercise Club</title>
  <meta name="description" content="A quiet little club for workouts, walks and honest logging.">
  <meta name="theme-color" content="#131211">
  <meta name="color-scheme" content="dark">
  <meta name="format-detection" content="telephone=no">
  <meta name="application-name" content="Form">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Form">
  <link rel="manifest" href="manifest.webmanifest?v=15">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="apple-touch-startup-image" href="icons/launch-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/launch-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/launch-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/launch-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/launch-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/launch-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/launch-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="wordmark">
        <span class="wordmark-main">Form</span>
        <span class="wordmark-sub">exercise club</span>
      </div>
      <div class="topbar-actions">
        <button class="profilebtn" id="profileBtn" aria-label="Current profile">
          <span id="profileName">Azhar</span>
        </button>
        <button class="iconbtn" id="syncBtn" aria-label="Sync status">
          <i data-lucide="cloud"></i><span class="sync-badge" id="syncBadge" hidden></span>
        </button>
        <button class="iconbtn" id="settingsBtn" aria-label="Settings">
          <i data-lucide="settings-2"></i>
        </button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <div id="restbar" class="restbar" hidden>
      <i data-lucide="timer"></i>
      <div class="restbar-time" id="restTime">0:60</div>
      <div class="restbar-label">rest</div>
      <button class="restbar-btn" id="restAdd">+15</button>
      <button class="restbar-btn restbar-skip" id="restSkip">skip</button>
    </div>

    <div id="motionbar" class="motionbar" hidden>
      <i data-lucide="activity"></i>
      <div class="motionbar-body">
        <div class="motionbar-main" id="motionMain">Motion coach</div>
        <div class="motionbar-sub" id="motionSub">Waiting for movement</div>
      </div>
      <button class="restbar-btn" id="motionFinish">finish</button>
      <button class="restbar-btn restbar-skip" id="motionCancel">cancel</button>
    </div>

    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-tab="today"><i data-lucide="dumbbell"></i><span>Today</span></button>
      <button class="tab" data-tab="library"><i data-lucide="book-open"></i><span>Library</span></button>
      <button class="tab" data-tab="run"><i data-lucide="footprints"></i><span>Run</span></button>
      <button class="tab" data-tab="progress"><i data-lucide="trending-up"></i><span>Progress</span></button>
    </nav>

    <div id="modal" class="modal" hidden>
      <div class="modal-scrim" id="modalScrim"></div>
      <div class="modal-sheet" id="modalSheet"></div>
    </div>

    <div id="toasts" class="toasts"></div>
  </div>

  <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
  <script src="config.js?v=15"></script>
  <script src="app.js?v=15"></script>
</body>
</html>
